[build]
  publish = "."
  command = "python3 build.py"

[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/content/site.json"
  [headers.values]
    Cache-Control = "no-cache"
